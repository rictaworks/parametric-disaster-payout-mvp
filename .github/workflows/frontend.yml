name: Frontend CI

on:
  pull_request:
    paths:
      - "src/frontend/**"
      - "test/**"

permissions:
  contents: read

defaults:
  run:
    working-directory: src/frontend

jobs:
  lint-and-test:
    name: ESLint & Jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Test (Jest)
        run: npm test -- --ci --passWithNoTests

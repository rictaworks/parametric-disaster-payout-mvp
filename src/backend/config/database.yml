# Development / Test: SQLite3
# Production: PostgreSQL (DATABASE_URL 環境変数で接続先を指定)
default_sqlite: &default_sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default_sqlite
  database: storage/development.sqlite3

test:
  <<: *default_sqlite
  # TEST_DATABASE_PATH: 通常は未設定で既定の storage/test.sqlite3 を使う。
  # 別プロセス（rakeタスク等）をspawnして実データをコミットするテストが、
  # RSpecプロセス本体と同じ storage/test.sqlite3 を共有すると、他のテスト
  # ファイルが期待するマスタデータと衝突しうる（別プロセスの書き込みは
  # RSpecのトランザクションロールバックの対象外のため）。そのようなテストは
  # 使い捨ての専用DBファイルへ隔離するために本変数を利用する。
  database: <%= ENV.fetch("TEST_DATABASE_PATH", "storage/test.sqlite3") %>

production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>
